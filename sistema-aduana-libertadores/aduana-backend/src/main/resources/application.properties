# ============================================================
# SISTEMA ADUANA - PASO LOS LIBERTADORES
# ============================================================

spring.application.name=sistema-aduana

# --- Base de Datos MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3307/aduana_libertadores?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=aduana_libertadores

# --- Servidor ---
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=true

# --- JWT ---
jwt.secret=aduanaChileSecretKeyMuySegura2024LoLibertadoresXYZ123456789ABCDEF
jwt.expiration=86400000

# --- Swagger UI ---
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- CORS ---
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200

# --- Logging ---
logging.level.cl.aduana=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
